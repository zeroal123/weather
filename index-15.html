<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="带伞吗">
<meta name="theme-color" content="#0f172a">
<title>今天带伞吗？</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<script src="https://webapi.amap.com/maps?v=2.0&key=4cf3d2bfb05cb6ab56e5aeab2de4d1fe&plugin=AMap.Geolocation,AMap.CitySearch"></script>
<style>
:root {
  --bg:#1a0f3d; --bg2:#2d1f5f; --bg3:#3d2879;
  --text:#ede9fe; --dim:rgba(196,181,253,0.65); --accent:#a78bfa; --accent2:#c4b5fd;
  --cta:#5eead4; --cta2:#34d399;
  --card:rgba(61,40,121,0.35); --border:rgba(167,139,250,0.18);
  --rain:#818cf8; --warn:#fbbf24; --danger:#f87171; --good:#4ade80;
  --rain-light:#a5b4fc; --rain-mid:#fbbf24; --rain-heavy:#f87171;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:'Noto Sans SC',-apple-system,sans-serif;background:var(--bg);color:var(--text);
  min-height:100vh;min-height:100dvh;overflow-x:hidden;padding:16px;padding-top:max(16px,env(safe-area-inset-top));
  padding-bottom:max(20px,env(safe-area-inset-bottom));line-height:1.6;
  background-image:radial-gradient(ellipse 80% 60% at 50% 0%,rgba(167,139,250,0.22),transparent 60%),radial-gradient(ellipse 60% 40% at 100% 100%,rgba(94,234,212,0.06),transparent 60%),linear-gradient(180deg,var(--bg) 0%,#120828 100%);
  background-attachment:fixed;}
.container{max-width:520px;margin:0 auto;}
.hero{text-align:center;margin-bottom:20px;padding-top:10px}
.hero-icon{font-size:52px;line-height:1;margin-bottom:8px}
.hero h1{font-size:26px;font-weight:900;letter-spacing:-0.5px;margin-bottom:4px}
.hero .sub{font-size:12px;color:var(--dim);letter-spacing:1px}

.btn-locate{width:100%;padding:14px;background:linear-gradient(135deg,var(--cta),var(--cta2));
  color:#0f2e26;border:none;border-radius:14px;font-size:15px;font-weight:700;cursor:pointer;
  box-shadow:0 4px 24px rgba(94,234,212,0.28);transition:transform 0.15s,box-shadow 0.15s;margin-bottom:10px}
.btn-locate:active{transform:scale(0.98)}
.btn-locate:disabled{opacity:0.6;cursor:not-allowed}

.toggle-link{text-align:center;margin-bottom:12px}
.toggle-link span{font-size:12px;color:var(--accent);cursor:pointer;border-bottom:1px dashed var(--accent)}

#mapSection{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:12px;margin-bottom:12px}
.map-tip{font-size:12px;color:var(--dim);margin-bottom:8px;text-align:center}
.map-wrap{width:100%;height:200px;border-radius:10px;overflow:hidden;margin-bottom:10px}
#amap{width:100%;height:100%}
.coord-row{display:flex;gap:8px}
.coord-row input{flex:1;padding:10px 12px;background:rgba(15,23,42,0.6);border:1px solid var(--border);
  border-radius:10px;color:var(--text);font-size:13px;font-family:inherit}
.coord-row button{padding:10px 16px;background:var(--accent);color:#1a0f3d;border:none;border-radius:10px;
  font-size:13px;font-weight:700;cursor:pointer}

.status-msg{text-align:center;font-size:12px;color:var(--dim);min-height:18px;margin-bottom:12px}
.status-msg.err{color:var(--danger)}
.status-msg.ok{color:var(--good)}

.alert-banner{background:linear-gradient(135deg,rgba(239,68,68,0.15),rgba(245,158,11,0.1));
  border:1px solid rgba(239,68,68,0.3);border-radius:14px;padding:12px 14px;margin-bottom:12px;display:none}
.alert-banner .alert-t{font-size:14px;font-weight:700;color:#fca5a5;margin-bottom:4px}
.alert-banner .alert-d{font-size:12px;color:var(--dim);line-height:1.5}

/* Verdict */
.verdict{border-radius:20px;padding:24px 20px;text-align:center;margin-bottom:14px;
  position:relative;overflow:hidden}
.verdict.rain{background:linear-gradient(135deg,#4c1d95,#5b21b6);border:1px solid rgba(167,139,250,0.35)}
.verdict.safe{background:linear-gradient(135deg,#065f46,#047857);border:1px solid rgba(94,234,212,0.3)}
.verdict.storm{background:linear-gradient(135deg,#7f1d1d,#991b1b);border:1px solid rgba(248,113,113,0.35)}
.verdict.hot{background:linear-gradient(135deg,#78350f,#92400e);border:1px solid rgba(251,191,36,0.3)}
.verdict.haze{background:linear-gradient(135deg,#44403c,#57534e);border:1px solid rgba(168,162,158,0.3)}
.verdict-head{font-size:28px;font-weight:900;letter-spacing:-0.5px;margin-bottom:6px}
.verdict-sub{font-size:13px;opacity:0.85;line-height:1.5}
.verdict-meta{font-size:11px;margin-top:10px;padding-top:10px;border-top:1px solid rgba(255,255,255,0.12);opacity:0.75}

.card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:14px;margin-bottom:12px;
  backdrop-filter:blur(10px)}
.card-title{font-size:13px;font-weight:700;color:var(--dim);margin-bottom:10px;display:flex;align-items:center;gap:6px;letter-spacing:0.5px}

/* Minute rain */
.rain-chart{position:relative;height:80px;background:rgba(15,23,42,0.4);border-radius:8px;overflow:hidden;margin-top:6px}
.rain-bar{position:absolute;bottom:0;background:var(--rain-light);border-radius:1px;transition:height 0.3s}
.rain-bar.moderate{background:var(--rain-mid)}
.rain-bar.heavy{background:var(--rain-heavy)}
.rain-labels{display:flex;justify-content:space-between;font-size:10px;color:var(--dim);margin-top:6px;padding:0 2px}
.rain-legend{font-size:11px;color:var(--dim);margin-top:6px;text-align:center}
.rain-legend .sw{display:inline-block;width:8px;height:8px;border-radius:2px;margin:0 2px 0 8px;vertical-align:middle}

/* Realtime grid */
.rt-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.rt-cell{text-align:center;padding:8px 4px;background:rgba(15,23,42,0.4);border-radius:10px}
.rt-cell .v{font-size:18px;font-weight:700;color:var(--text);margin-bottom:2px}
.rt-cell .l{font-size:10px;color:var(--dim);letter-spacing:0.5px}
.rt-big{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.rt-temp{font-size:44px;font-weight:900;line-height:1;letter-spacing:-2px}
.rt-skycon{font-size:44px}
.rt-desc{font-size:13px;color:var(--dim);margin-top:4px}

/* Info row */
.info-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:12px}
.info-tile{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:12px 8px;text-align:center}
.info-tile .icon{font-size:20px;margin-bottom:4px}
.info-tile .val{font-size:14px;font-weight:700;color:var(--text)}
.info-tile .lbl{font-size:10px;color:var(--dim);margin-top:2px}

/* Clothing */
.cloth-text{font-size:13px;line-height:1.7}
.cloth-main{font-size:14px;font-weight:500;margin-bottom:6px}
.cloth-detail{font-size:12px;color:var(--dim);line-height:1.6}

/* Tips */
.tips-list{display:flex;flex-direction:column;gap:6px}
.tip-item{display:flex;align-items:flex-start;gap:8px;padding:8px 10px;border-radius:10px;font-size:12px;line-height:1.5}
.tip-item .tip-icon{font-size:16px;flex-shrink:0;margin-top:1px}
.tip-item .tip-text{flex:1}
.tip-warn{background:rgba(251,191,36,0.1);border:1px solid rgba(251,191,36,0.2)}
.tip-danger{background:rgba(248,113,113,0.1);border:1px solid rgba(248,113,113,0.2)}
.tip-info{background:rgba(96,165,250,0.1);border:1px solid rgba(96,165,250,0.2)}
.tip-good{background:rgba(74,222,128,0.08);border:1px solid rgba(74,222,128,0.2)}

/* Hourly */
.hourly{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;scrollbar-width:none}
.hourly::-webkit-scrollbar{display:none}
.hour-cell{flex:0 0 54px;text-align:center;padding:8px 2px;background:rgba(15,23,42,0.4);border-radius:10px}
.hour-cell.rain-cell{background:rgba(129,140,248,0.18);border:1px solid rgba(165,180,252,0.3)}
.h-lbl{font-size:11px;color:var(--dim);margin-bottom:4px}
.h-ico{font-size:20px;margin-bottom:2px}
.h-t{font-size:13px;font-weight:600}
.h-dot{width:5px;height:5px;border-radius:50%;margin:4px auto 0}

/* Daily */
.daily{display:flex;flex-direction:column;gap:6px}
.daily-row{display:grid;grid-template-columns:48px 30px 1fr 70px;gap:8px;align-items:center;padding:6px 4px;font-size:13px}
.d-day{color:var(--dim);font-size:12px}
.d-ico{font-size:18px;text-align:center}
.d-bar-wrap{position:relative;height:6px;background:rgba(148,163,184,0.15);border-radius:3px;overflow:hidden}
.d-bar{position:absolute;top:0;height:100%;background:linear-gradient(90deg,#60a5fa,#fbbf24,#ef4444);border-radius:3px}
.d-t{text-align:right;font-size:12px}
.d-t .lo{color:var(--dim);margin-right:6px}

/* Stability legend */
.stab-legend{font-size:10px;color:var(--dim);margin-top:8px;padding-top:8px;border-top:1px dashed var(--border);
  display:flex;justify-content:center;gap:12px;flex-wrap:wrap}
.stab-legend .chip{display:inline-flex;align-items:center;gap:4px}
.stab-legend .d{width:6px;height:6px;border-radius:50%}

/* Dry window */
.dry-window{background:linear-gradient(135deg,rgba(34,197,94,0.15),rgba(34,197,94,0.05));
  border:1px solid rgba(34,197,94,0.3);border-radius:12px;padding:10px 12px;margin-bottom:12px;
  font-size:13px;display:flex;align-items:center;gap:8px}
.dry-window .ic{font-size:18px}

.refresh-info{text-align:center;font-size:10px;color:var(--dim);margin-top:16px;opacity:0.7;line-height:1.6}

.fade{animation:fadeUp 0.4s ease-out both}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>
<div class="container">

  <div class="hero fade">
    <div class="hero-icon" id="heroIcon">🌤️</div>
    <h1>今天带伞吗？</h1>
    <div class="sub">精准定位 · 分钟级降雨 · 彩云天气</div>
  </div>

  <div class="alert-banner" id="alertBanner">
    <div class="alert-t" id="alertTitle"></div>
    <div class="alert-d" id="alertDesc"></div>
  </div>

  <button class="btn-locate" id="locBtn" onclick="tryAutoLocate()">📍 一键定位查天气</button>

  <div id="mapSection">
    <div class="map-tip">👆 在地图上点击你的位置</div>
    <div class="map-wrap"><div id="amap"></div></div>
    <div class="coord-row">
      <input type="text" id="coordInput" placeholder="经度,纬度（如 104.07,30.67）">
      <button onclick="manualCoord()">查询</button>
    </div>
  </div>
  <div class="toggle-link"><span onclick="toggleMap()">📌 手动选点 / 输入坐标</span></div>

  <div class="status-msg" id="statusMsg"></div>

  <div id="weatherContent" style="display:none">
    <div class="verdict" id="verdict"></div>
    <div id="dryWindowBox"></div>

    <div class="card fade" id="minuteCard" style="display:none">
      <div class="card-title">⏱️ <span>未来2小时逐分钟降雨</span></div>
      <div id="minuteDesc" style="font-size:12px;color:var(--dim);margin-bottom:4px"></div>
      <div class="rain-chart" id="rainChart"></div>
      <div class="rain-labels"><span>现在</span><span>30min</span><span>60min</span><span>90min</span><span>120min</span></div>
      <div class="rain-legend" id="rainLegend"></div>
    </div>

    <div class="card fade">
      <div class="card-title">🌡️ <span>实时天气</span></div>
      <div class="rt-big">
        <div>
          <div class="rt-temp" id="rtTemp">--</div>
          <div class="rt-desc" id="rtDesc"></div>
        </div>
        <div class="rt-skycon" id="rtSkycon">🌤️</div>
      </div>
      <div class="rt-grid" id="rtGrid"></div>
    </div>

    <div class="info-row fade" id="infoRow"></div>

    <div class="card fade" id="clothCard">
      <div class="card-title">👔 <span>穿衣建议</span></div>
      <div id="clothText"></div>
    </div>

    <div class="card fade" id="tipsCard" style="display:none">
      <div class="card-title">💡 <span>出门提醒</span></div>
      <div class="tips-list" id="tipsList"></div>
    </div>

    <div class="card fade">
      <div class="card-title">📊 <span>逐小时预报</span> <span style="font-size:10px;color:var(--dim);font-weight:400">· 底部圆点=预报稳定性</span></div>
      <div class="hourly" id="hourly"></div>
      <div class="stab-legend">
        <span class="chip"><span class="d" style="background:var(--good)"></span>稳定无雨</span>
        <span class="chip"><span class="d" style="background:var(--warn)"></span>预报反复</span>
        <span class="chip"><span class="d" style="background:var(--danger)"></span>稳定有雨</span>
      </div>
    </div>

    <div class="card fade">
      <div class="card-title">📅 <span>未来5天</span></div>
      <div class="daily" id="daily"></div>
    </div>

    <div class="refresh-info" id="refreshInfo"></div>
  </div>
</div>

<script>
// ===== CONFIG =====
const TOKEN = 'DpS87YWOT1lMMBPB';
const RAIN_THRESHOLD = 0.08;      // mm/h — Caiyun standard; below this is model noise
const RAIN_THRESHOLD_SOLO = 0.1;  // mm/h — high enough to count as rain even without rain skycon
const COORD_KEY = 'wx_coord_v2';
const HISTORY_KEY = 'wx_history_v3'; // v3: clear old snapshots with wrong threshold
const MAX_HISTORY = 12;           // keep last 12 query snapshots
const HISTORY_EXPIRE_HR = 48;     // drop snapshots older than 48h
const REFRESH_MS = 2 * 60 * 60 * 1000;  // auto-refresh every 2h
const REFRESH_STALE_MIN = 30;     // auto-refresh on visibility if data older than 30min

// ===== SKYCON MAPS =====
const SK_EMOJI = {
  CLEAR_DAY:'☀️',CLEAR_NIGHT:'🌙',PARTLY_CLOUDY_DAY:'⛅',PARTLY_CLOUDY_NIGHT:'☁️',CLOUDY:'☁️',
  LIGHT_HAZE:'🌫️',MODERATE_HAZE:'🌫️',HEAVY_HAZE:'🌫️',FOG:'🌫️',DUST:'🌪️',SAND:'🌪️',WIND:'💨',
  LIGHT_RAIN:'🌦️',MODERATE_RAIN:'🌧️',HEAVY_RAIN:'🌧️',STORM_RAIN:'⛈️',
  LIGHT_SNOW:'🌨️',MODERATE_SNOW:'❄️',HEAVY_SNOW:'❄️',STORM_SNOW:'❄️',THUNDER_SHOWER:'⛈️'
};
const SK_CN = {
  CLEAR_DAY:'晴',CLEAR_NIGHT:'晴',PARTLY_CLOUDY_DAY:'多云',PARTLY_CLOUDY_NIGHT:'多云',CLOUDY:'阴',
  LIGHT_HAZE:'轻度雾霾',MODERATE_HAZE:'中度雾霾',HEAVY_HAZE:'重度雾霾',FOG:'雾',DUST:'浮尘',SAND:'沙尘',WIND:'大风',
  LIGHT_RAIN:'小雨',MODERATE_RAIN:'中雨',HEAVY_RAIN:'大雨',STORM_RAIN:'暴雨',
  LIGHT_SNOW:'小雪',MODERATE_SNOW:'中雪',HEAVY_SNOW:'大雪',STORM_SNOW:'暴雪',THUNDER_SHOWER:'雷阵雨'
};
const isRain = s => s && (s.includes('RAIN') || s.includes('THUNDER'));
const isSnow = s => s && s.includes('SNOW');
const isHaze = s => s && (s.includes('HAZE') || s === 'FOG' || s === 'DUST' || s === 'SAND');
const emoji = s => SK_EMOJI[s] || '🌤️';
const cn = s => SK_CN[s] || '未知';

// ===== RAIN LEVEL (based on Caiyun precipitation intensity mm/h) =====
function getRainLevel(skycon, precip) {
  if (isSnow(skycon)) {
    if (precip >= 0.5) return { level:'heavy-snow', label:'大雪', emoji:'❄️', severity:3 };
    return { level:'snow', label:'小到中雪', emoji:'🌨️', severity:2 };
  }
  if (!isRain(skycon) && precip < RAIN_THRESHOLD) return { level:'none', label:'无', emoji:'', severity:0 };
  // Caiyun precipitation intensity ranges (adjusted to real-world output):
  // Light: 0.08-0.25  Moderate: 0.25-0.5  Heavy: 0.5-1.0  Storm: >1.0
  if (precip >= 1.0 || skycon === 'STORM_RAIN') return { level:'storm', label:'暴雨', emoji:'⛈️', severity:4 };
  if (precip >= 0.5 || skycon === 'HEAVY_RAIN') return { level:'heavy', label:'大雨', emoji:'🌧️', severity:3 };
  if (precip >= 0.25 || skycon === 'MODERATE_RAIN') return { level:'moderate', label:'中雨', emoji:'🌧️', severity:2 };
  return { level:'light', label:'小雨', emoji:'🌦️', severity:1 };
}

// Get the worst rain expected in the next N hours from hourly data
function getWorstRain(hr, hours) {
  if (!hr || !hr.skycon) return getRainLevel('CLEAR_DAY', 0);
  let worst = { severity: 0 };
  const len = Math.min(hr.skycon.length, hours);
  for (let i = 0; i < len; i++) {
    const p = (hr.precipitation && hr.precipitation[i]) ? hr.precipitation[i].value : 0;
    const rl = getRainLevel(hr.skycon[i].value, p);
    if (rl.severity > worst.severity) worst = rl;
  }
  return worst;
}

// Get first rain hour and end hour from hourly data
function getRainWindow(hr, hours) {
  if (!hr || !hr.skycon) return null;
  const len = Math.min(hr.skycon.length, hours);
  let first = -1, last = -1;
  for (let i = 0; i < len; i++) {
    const p = (hr.precipitation && hr.precipitation[i]) ? hr.precipitation[i].value : 0;
    const isWet = (isRain(hr.skycon[i].value) || isSnow(hr.skycon[i].value)) && p >= RAIN_THRESHOLD;
    if (isWet) {
      if (first < 0) first = i;
      last = i;
    }
  }
  if (first < 0) return null;
  return {
    startHour: new Date(hr.skycon[first].datetime).getHours(),
    endHour: new Date(hr.skycon[last].datetime).getHours() + 1,
    startsIn: first // hours from now
  };
}

// ===== COMFORT ASSESSMENT =====
function getComfortLevel(temp, humidity, wind, skycon) {
  const h = humidity * 100;
  // Heat stress: high temp + high humidity
  if (temp >= 35 && h >= 60) return { level:'extreme-hot', label:'极端闷热', emoji:'🥵', warn:'高温红色预警级别' };
  if (temp >= 33 && h >= 70) return { level:'muggy', label:'闷热难耐', emoji:'🥵', warn:'注意中暑风险' };
  if (temp >= 30 && h >= 65) return { level:'hot-humid', label:'闷热', emoji:'🥵', warn:'多补水' };
  if (temp >= 30) return { level:'hot', label:'炎热', emoji:'☀️', warn:'注意防晒' };
  if (temp >= 25 && h >= 80) return { level:'warm-sticky', label:'温暖潮湿', emoji:'💧', warn:'体感闷' };
  if (temp >= 25) return { level:'warm', label:'温暖', emoji:'😊', warn:null };
  if (temp >= 18) return { level:'pleasant', label:'舒适', emoji:'😎', warn:null };
  if (temp >= 10) return { level:'cool', label:'微凉', emoji:'🍃', warn:null };
  if (temp >= 5 && wind >= 20) return { level:'cold-windy', label:'寒冷有风', emoji:'🌬️', warn:'风寒效应明显' };
  if (temp >= 0) return { level:'cold', label:'寒冷', emoji:'🥶', warn:'注意保暖' };
  if (temp >= -10) return { level:'freezing', label:'严寒', emoji:'🥶', warn:'极端低温，减少外出' };
  return { level:'extreme-cold', label:'极寒', emoji:'❄️', warn:'危险低温' };
}

// ===== STORAGE =====
function saveCoord(lng, lat) {
  try { localStorage.setItem(COORD_KEY, JSON.stringify({ lng, lat, ts: Date.now() })); } catch(e){}
}
function getCoord() {
  try { return JSON.parse(localStorage.getItem(COORD_KEY)); } catch(e) { return null; }
}

function getHistory() {
  try {
    const arr = JSON.parse(localStorage.getItem(HISTORY_KEY)) || [];
    const cutoff = Date.now() - HISTORY_EXPIRE_HR * 3600 * 1000;
    return arr.filter(r => r.ts > cutoff);
  } catch(e) { return []; }
}
const MIN_SNAPSHOT_INTERVAL_MIN = 20;  // don't save a new snapshot if last one is <20min old
function saveHistorySnapshot(hourly) {
  if (!hourly || !hourly.skycon) return;
  try {
    const arr = getHistory();
    // Guard: skip if last snapshot is too recent (short-refresh protection)
    if (arr.length > 0) {
      const lastTs = arr[arr.length - 1].ts;
      if (Date.now() - lastTs < MIN_SNAPSHOT_INTERVAL_MIN * 60 * 1000) {
        return;  // same forecast data, don't pollute history
      }
    }
    const hours = hourly.skycon.slice(0, 24).map((s, i) => {
      const p = (hourly.precipitation && hourly.precipitation[i]) ? hourly.precipitation[i].value : 0;
      // Rain = skycon says rain/snow AND precipitation meets threshold, OR precipitation alone is significant
      const rain = ((isRain(s.value) || isSnow(s.value)) && p >= RAIN_THRESHOLD) || p >= RAIN_THRESHOLD_SOLO;
      return { dt: s.datetime, rain, p };
    });
    arr.push({ ts: Date.now(), hours });
    // Keep only the most recent MAX_HISTORY snapshots
    const trimmed = arr.slice(-MAX_HISTORY);
    localStorage.setItem(HISTORY_KEY, JSON.stringify(trimmed));
  } catch(e) {}
}
// Returns stability for a given hour's datetime:
//   { count, rainVotes, status: 'green' | 'yellow' | 'red' | null }
// null means not enough data (< 2 snapshots)
function getStability(datetime) {
  const history = getHistory();
  if (history.length < 2) return { count: history.length, rainVotes: 0, status: null };
  const targetHour = new Date(datetime).getTime();
  let count = 0, rainVotes = 0;
  for (const rec of history) {
    for (const h of rec.hours) {
      if (Math.abs(new Date(h.dt).getTime() - targetHour) < 30 * 60 * 1000) {
        count++;
        if (h.rain) rainVotes++;
        break;
      }
    }
  }
  if (count < 2) return { count, rainVotes, status: null };
  const rainRatio = rainVotes / count;
  let status;
  if (rainRatio === 0) status = 'green';
  else if (rainRatio === 1) status = 'red';
  else status = 'yellow';
  return { count, rainVotes, status };
}

// ===== JSONP =====
function jsonp(url) {
  return new Promise((resolve, reject) => {
    const cb = '_cb_' + Math.random().toString(36).slice(2, 10);
    const timeout = setTimeout(() => { cleanup(); reject(new Error('请求超时')); }, 15000);
    function cleanup() {
      delete window[cb];
      const el = document.getElementById(cb);
      if (el) el.remove();
      clearTimeout(timeout);
    }
    window[cb] = (d) => { cleanup(); resolve(d); };
    const s = document.createElement('script');
    s.id = cb;
    s.src = url + (url.includes('?') ? '&' : '?') + 'callback=' + cb;
    s.onerror = () => { cleanup(); reject(new Error('网络错误')); };
    document.head.appendChild(s);
  });
}

let map = null, marker = null;
function initMap() {
  if (map) return;
  const saved = getCoord();
  const center = saved ? [saved.lng, saved.lat] : [104.678, 31.465]; // default Mianyang
  map = new AMap.Map('amap', { zoom: 13, center });
  if (saved) setMarker(saved.lng, saved.lat);
  map.on('click', e => {
    const lng = e.lnglat.getLng(), lat = e.lnglat.getLat();
    setMarker(lng, lat);
    saveCoord(lng, lat);
    fetchWeather(lng, lat);
  });
}
function setMarker(lng, lat) {
  if (marker) marker.setMap(null);
  marker = new AMap.Marker({ position: [lng, lat], map });
  map.setCenter([lng, lat]);
}

function manualCoord() {
  const v = document.getElementById('coordInput').value.trim();
  const m = v.match(/([\d.]+)[,，\s]+([\d.]+)/);
  if (!m) { setStatus('坐标格式错误，示例：104.07,30.67', 'err'); return; }
  const lng = parseFloat(m[1]), lat = parseFloat(m[2]);
  saveCoord(lng, lat);
  fetchWeather(lng, lat);
}

function tryAutoLocate() {
  const btn = document.getElementById('locBtn');
  btn.disabled = true;
  setStatus('正在定位...', '');

  const geo = new AMap.Geolocation({
    enableHighAccuracy: true, timeout: 12000, GeoLocationFirst: true, needAddress: false
  });
  geo.getCurrentPosition((status, result) => {
    btn.disabled = false;
    if (status === 'complete') {
      const lng = result.position.lng, lat = result.position.lat;
      saveCoord(lng, lat);
      setStatus('定位成功', 'ok');
      fetchWeather(lng, lat);
    } else {
      const saved = getCoord();
      if (saved) {
        setStatus('定位失败，使用上次位置', '');
        fetchWeather(saved.lng, saved.lat);
      } else {
        setStatus('定位失败，请在下方地图选点', 'err');
        document.getElementById('mapSection').style.display = 'block';
        initMap();
      }
    }
  });
}

// ===== FETCH =====
let lastFetchTs = 0;
const MAX_RETRIES = 2;
async function fetchWeather(lng, lat, retry = 0) {
  setStatus(retry > 0 ? `重试中 (${retry}/${MAX_RETRIES})...` : '加载天气数据...', '');
  const url = `https://api.caiyunapp.com/v2.6/${TOKEN}/${lng.toFixed(4)},${lat.toFixed(4)}/weather?alert=true&dailysteps=5&hourlysteps=24`;
  try {
    const data = await jsonp(url);
    if (data.status !== 'ok') throw new Error(data.error || 'API错误');
    lastFetchTs = Date.now();
    saveHistorySnapshot(data.result.hourly);
    render(data.result);
    setStatus(`更新于 ${new Date().toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit'})} · ${lng.toFixed(3)}, ${lat.toFixed(3)}`, 'ok');
  } catch (e) {
    if (retry < MAX_RETRIES) {
      setTimeout(() => fetchWeather(lng, lat, retry + 1), 2000);
    } else {
      setStatus('加载失败：' + e.message + '（已重试' + MAX_RETRIES + '次）', 'err');
    }
  }
}

function silentRefresh() {
  const saved = getCoord();
  if (saved) fetchWeather(saved.lng, saved.lat);
}

function renderVerdict(rt, minutely, hr, daily) {
  const el = document.getElementById('verdict');
  const rtPrecip = (rt.precipitation && rt.precipitation.local) ? rt.precipitation.local.intensity : 0;
  const nowRaining = (isRain(rt.skycon) || isSnow(rt.skycon)) && rtPrecip >= RAIN_THRESHOLD;
  let minuteRain = false, minDesc = '';
  if (minutely && minutely.precipitation_2h) minuteRain = minutely.precipitation_2h.some(v => v >= RAIN_THRESHOLD);
  if (minutely && minutely.description) minDesc = minutely.description;

  // Get worst rain in next 2h and 12h
  const nowLevel = getRainLevel(rt.skycon, rtPrecip);
  const worst2h = getWorstRain(hr, 2);
  const worst12h = getWorstRain(hr, 12);
  const rainWin = getRainWindow(hr, 12);
  const worstOverall = [nowLevel, worst2h, worst12h].sort((a, b) => b.severity - a.severity)[0];

  // Stability
  const history = getHistory();
  let rainySnapshots = 0, totalSnapshots = 0;
  const nowMs = Date.now();
  const futureMs = nowMs + 12 * 3600 * 1000;
  for (const rec of history) {
    const futureHours = rec.hours.filter(h => {
      const t = new Date(h.dt).getTime();
      return t >= nowMs - 30 * 60 * 1000 && t <= futureMs;
    });
    if (futureHours.length < 3) continue;
    totalSnapshots++;
    if (futureHours.some(h => h.rain)) rainySnapshots++;
  }

  const willRain = nowRaining || minuteRain || worst12h.severity > 0;
  const comfort = getComfortLevel(rt.apparent_temperature, rt.humidity, rt.wind.speed, rt.skycon);

  // Build verdict content
  let head, sub, cls;
  if (willRain) {
    if (worstOverall.severity >= 4) {
      head = `${worstOverall.emoji} ${worstOverall.label}警告！`;
      cls = 'verdict storm';
      sub = nowRaining ? `当前${nowLevel.label}，未来可能加强到${worstOverall.label}`
        : `预计有${worstOverall.label}，建议非必要不出门`;
    } else if (worstOverall.severity >= 3) {
      head = `${worstOverall.emoji} ${worstOverall.label}，带好伞`;
      cls = 'verdict rain';
      sub = nowRaining ? `当前${nowLevel.label}` : `${rainWin ? (rainWin.startsIn <= 1 ? '即将' : '未来' + rainWin.startsIn + '小时后') : ''}可能转${worstOverall.label}`;
    } else if (worstOverall.severity >= 2) {
      head = `${worstOverall.emoji} ${worstOverall.label}，记得带伞`;
      cls = 'verdict rain';
      if (nowRaining) {
        sub = `正在下${nowLevel.label}`;
      } else if (rainWin) {
        sub = `约${rainWin.startHour}时开始，持续到${rainWin.endHour}时左右`;
      } else {
        sub = minDesc || '今天有降雨，出门带伞';
      }
    } else {
      head = '🌦️ 小雨，建议带把伞';
      cls = 'verdict rain';
      if (nowRaining) {
        sub = '当前有零星小雨';
      } else if (rainWin) {
        sub = `约${rainWin.startHour}时前后有小雨，不耽误出行`;
      } else {
        sub = minDesc || '有零星小雨可能';
      }
    }
  } else {
    // No rain — show weather condition as headline
    if (isHaze(rt.skycon)) {
      head = `🌫️ ${cn(rt.skycon)}天，不用带伞`;
      cls = 'verdict haze';
      sub = '无降雨，但空气质量不佳';
    } else if (comfort.level.includes('hot') || comfort.level === 'muggy') {
      head = `${comfort.emoji} ${comfort.label}，不用带伞`;
      cls = 'verdict hot';
      sub = `体感 ${Math.round(rt.apparent_temperature)}°，${comfort.warn || '注意防暑'}`;
    } else {
      head = '😎 不用带伞';
      cls = 'verdict safe';
      const descMentionsRain = minDesc && /雨|雪|降水/.test(minDesc);
      if (descMentionsRain) {
        sub = '彩云提示「' + minDesc + '」但降水量极微，大概率不会落地';
      } else {
        sub = `${cn(rt.skycon)}，体感 ${Math.round(rt.apparent_temperature)}°，${comfort.label}`;
      }
    }
  }

  let meta = '';
  const fetchTime = new Date().toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit'});
  if (totalSnapshots >= 2) {
    const pct = Math.round(rainySnapshots / totalSnapshots * 100);
    meta = `📊 ${totalSnapshots}次查询中${pct}%预测有雨 · 🕐 ${fetchTime}`;
  } else {
    meta = `🕐 ${fetchTime} 更新`;
  }

  el.className = cls;
  el.innerHTML = `<div class="verdict-head">${head}</div><div class="verdict-sub">${sub}</div><div class="verdict-meta">${meta}</div>`;
}

function renderDryWindow(hr) {
  const box = document.getElementById('dryWindowBox');
  box.innerHTML = '';
  if (!hr || !hr.skycon) return;
  const next12 = hr.skycon.slice(0, 12);
  const isWetHour = (i) => {
    const hasSkycon = isRain(next12[i].value) || isSnow(next12[i].value);
    const precip = (hr.precipitation && hr.precipitation[i]) ? hr.precipitation[i].value : 0;
    return hasSkycon && precip >= RAIN_THRESHOLD;
  };
  const anyRain = next12.some((_, i) => isWetHour(i));
  if (!anyRain) return;
  // Find longest consecutive dry run
  let best = { start: -1, end: -1, len: 0 }, cur = { start: -1, len: 0 };
  next12.forEach((s, i) => {
    if (!isWetHour(i)) {
      if (cur.start < 0) cur.start = i;
      cur.len++;
      if (cur.len > best.len) best = { start: cur.start, end: i, len: cur.len };
    } else {
      cur = { start: -1, len: 0 };
    }
  });
  if (best.len >= 2) {
    const sh = new Date(next12[best.start].datetime).getHours();
    const eh = new Date(next12[best.end].datetime).getHours();
    box.innerHTML = `<div class="dry-window"><span class="ic">🚪</span><div><b>无雨出门窗口：${sh}:00 - ${eh + 1}:00</b><div style="font-size:11px;color:var(--dim);margin-top:2px">这段时间预计无雨，适合外出</div></div></div>`;
  }
}

function renderMinutely(m) {
  const card = document.getElementById('minuteCard');
  if (!m || !m.precipitation_2h || m.precipitation_2h.length === 0) { card.style.display = 'none'; return; }
  card.style.display = 'block';
  document.getElementById('minuteDesc').textContent = m.description || '';
  const p = m.precipitation_2h;
  const maxP = Math.max(...p, 0.5);
  const chart = document.getElementById('rainChart');
  const barW = 100 / p.length;
  let html = '';
  for (let i = 0; i < p.length; i++) {
    const v = p[i];
    let cls = '', h = 0;
    if (v >= RAIN_THRESHOLD) {
      h = Math.max(6, (v / maxP) * 90);
      cls = v > 0.25 ? 'heavy' : v > 0.1 ? 'moderate' : '';
    }
    if (h > 0) html += `<div class="rain-bar ${cls}" style="left:${i * barW}%;width:${Math.max(barW - 0.15, 0.4)}%;height:${h}%"></div>`;
  }
  chart.innerHTML = html;
  const hasAny = p.some(v => v >= RAIN_THRESHOLD);
  document.getElementById('rainLegend').innerHTML = hasAny
    ? '<span class="sw" style="background:var(--rain-light)"></span>小雨<span class="sw" style="background:var(--rain-mid)"></span>中雨<span class="sw" style="background:var(--rain-heavy)"></span>大雨'
    : '🟢 未来2小时无降雨';
}

function renderClothing(rt, hr, daily) {
  const t = rt.apparent_temperature;
  const temp = rt.temperature;
  const hum = rt.humidity;
  const wind = rt.wind.speed;
  const skycon = rt.skycon;
  const aqi = rt.air_quality ? rt.air_quality.aqi.chn : 0;
  const uv = (daily && daily.life_index && daily.life_index.ultraviolet && daily.life_index.ultraviolet[0]) ? daily.life_index.ultraviolet[0].index : 0;

  // Daily temperature range
  const todayTemp = daily && daily.temperature && daily.temperature[0];
  const dayMin = todayTemp ? todayTemp.min : temp;
  const dayMax = todayTemp ? todayTemp.max : temp;
  const swing = dayMax - dayMin;

  const comfort = getComfortLevel(t, hum, wind, skycon);

  // Base clothing by apparent temperature
  let main = '';
  if (t >= 33) main = '轻薄透气短袖短裤，选速干面料最佳';
  else if (t >= 28) main = '短袖短裤或连衣裙，宽松透气为主';
  else if (t >= 25) main = '短袖配薄长裤，体感温暖偏热';
  else if (t >= 20) main = '短袖或薄长袖，可备一件薄外套';
  else if (t >= 15) main = '长袖加薄外套，卫衣或薄夹克都行';
  else if (t >= 10) main = '外套必备，卫衣+夹克或薄棉服';
  else if (t >= 5) main = '毛衣加厚外套，围巾别忘';
  else if (t >= 0) main = '羽绒服或厚棉服，围巾手套全套';
  else main = '全套保暖：羽绒服、保暖内衣、围巾手套帽子';

  // Modifiers
  let details = [];

  // Humidity modifier
  if (t >= 25 && hum >= 0.8) details.push('💧 湿度' + Math.round(hum * 100) + '%，闷热感强，选棉质或速干面料');
  else if (t >= 25 && hum >= 0.65) details.push('💧 湿度偏高，容易出汗，建议浅色透气衣物');
  else if (t < 10 && hum <= 0.3) details.push('💧 空气干燥，注意皮肤保湿');

  // Wind modifier
  if (wind >= 30) details.push('💨 风力较强（' + wind.toFixed(0) + 'km/h），外套要防风，注意固定好帽子围巾');
  else if (wind >= 20 && t < 15) details.push('💨 有风且气温低，风寒效应明显，比实际温度冷不少');
  else if (wind >= 15 && t < 10) details.push('💨 冷风吹着更冷，领口袖口扎紧');

  // Temperature swing
  if (swing >= 15) details.push('🌡️ 今日温差 ' + Math.round(swing) + '°C，早晚比中午冷很多，务必多带件外套');
  else if (swing >= 10) details.push('🌡️ 温差 ' + Math.round(swing) + '°C，建议洋葱穿法，方便增减');

  // UV
  if (uv >= 8) details.push('☀️ 紫外线极强（' + uv + '），必须防晒：防晒霜+帽子+墨镜');
  else if (uv >= 5) details.push('☀️ 紫外线较强（' + uv + '），出门记得涂防晒');
  else if (uv >= 3 && t >= 25) details.push('☀️ 紫外线中等，长时间户外建议防晒');

  // AQI
  if (aqi >= 200) details.push('😷 空气重度污染（AQI ' + aqi + '），务必戴N95口罩，尽量减少户外活动');
  else if (aqi >= 150) details.push('😷 空气中度污染（AQI ' + aqi + '），建议佩戴口罩');
  else if (aqi >= 100) details.push('😷 空气轻度污染（AQI ' + aqi + '），敏感人群建议戴口罩');

  // Rain gear
  const rtPrecip = (rt.precipitation && rt.precipitation.local) ? rt.precipitation.local.intensity : 0;
  if (isRain(skycon) && rtPrecip >= RAIN_THRESHOLD) {
    const rl = getRainLevel(skycon, rtPrecip);
    if (rl.severity >= 3) details.push('☔ 正在下' + rl.label + '，雨伞可能不够，建议雨衣+防水鞋');
    else details.push('☂️ 外面在下' + rl.label + '，出门带伞，注意路滑');
  } else if (isSnow(skycon)) {
    details.push('🌨️ 正在下雪，穿防水防滑的鞋子');
  }

  // Haze
  if (isHaze(skycon) && aqi < 100) details.push('🌫️ 有雾，能见度低，出行注意安全');

  // Build output
  const el = document.getElementById('clothText');
  let html = `<div class="cloth-main">${comfort.emoji} ${main}</div>`;
  if (details.length > 0) {
    html += `<div class="cloth-detail">${details.join('<br>')}</div>`;
  }
  el.innerHTML = html;
}

function renderTips(rt, minutely, hr, daily) {
  const card = document.getElementById('tipsCard');
  const list = document.getElementById('tipsList');
  const tips = []; // { icon, text, priority(1-5), type:'danger'|'warn'|'info'|'good' }

  const temp = rt.temperature;
  const appTemp = rt.apparent_temperature;
  const hum = rt.humidity;
  const wind = rt.wind.speed;
  const aqi = rt.air_quality ? rt.air_quality.aqi.chn : 0;
  const uv = (daily && daily.life_index && daily.life_index.ultraviolet && daily.life_index.ultraviolet[0]) ? daily.life_index.ultraviolet[0].index : 0;
  const todayTemp = daily && daily.temperature && daily.temperature[0];
  const swing = todayTemp ? todayTemp.max - todayTemp.min : 0;

  // Heat stroke risk
  if (appTemp >= 37) tips.push({ icon:'🔴', text:'体感超过37°，有中暑风险，尽量待在阴凉处，大量补水', priority:5, type:'danger' });
  else if (appTemp >= 33 && hum >= 0.65) tips.push({ icon:'🟠', text:'高温高湿，容易中暑，避免长时间户外活动，随身带水', priority:4, type:'warn' });

  // Upcoming rain timing
  const rainWin = getRainWindow(hr, 12);
  const rtPrecip = (rt.precipitation && rt.precipitation.local) ? rt.precipitation.local.intensity : 0;
  const isCurrentlyRaining = (isRain(rt.skycon) || isSnow(rt.skycon)) && rtPrecip >= RAIN_THRESHOLD;
  if (rainWin && !isCurrentlyRaining) {
    if (rainWin.startsIn <= 1) {
      tips.push({ icon:'🌧️', text:`约1小时内开始下雨，现在出门要抓紧`, priority:4, type:'warn' });
    } else if (rainWin.startsIn <= 3) {
      tips.push({ icon:'🌦️', text:`预计${rainWin.startHour}时左右开始下雨，提前安排好行程`, priority:3, type:'info' });
    }
  }
  // Heavy rain warning
  const worst6h = getWorstRain(hr, 6);
  if (worst6h.severity >= 4) {
    tips.push({ icon:'⛈️', text:'未来6小时可能有暴雨，非必要不出门，注意避开低洼地带', priority:5, type:'danger' });
  } else if (worst6h.severity >= 3) {
    tips.push({ icon:'🌧️', text:'未来6小时可能有大雨，出门带好雨具，穿防水鞋', priority:4, type:'warn' });
  }

  // Wind
  if (wind >= 40) tips.push({ icon:'🌪️', text:'风力很大（' + wind.toFixed(0) + 'km/h），注意高空坠物和广告牌，骑车慎行', priority:4, type:'danger' });
  else if (wind >= 25) tips.push({ icon:'💨', text:'风较大，骑车/打伞可能受影响', priority:2, type:'info' });

  // Temperature swing
  if (swing >= 15) {
    tips.push({ icon:'🌡️', text:`今天最高${Math.round(todayTemp.max)}°、最低${Math.round(todayTemp.min)}°，温差${Math.round(swing)}°，早晚出门多穿一层`, priority:3, type:'warn' });
  } else if (swing >= 10) {
    tips.push({ icon:'🌡️', text:`早晚温差${Math.round(swing)}°，出门建议多带件衣服备用`, priority:2, type:'info' });
  }

  // UV
  if (uv >= 8) tips.push({ icon:'🧴', text:'紫外线极强，户外15分钟就可能晒伤，做好防护', priority:3, type:'warn' });
  else if (uv >= 5 && !isCurrentlyRaining) tips.push({ icon:'🧴', text:'紫外线较强，长时间户外记得防晒', priority:2, type:'info' });

  // AQI
  if (aqi >= 200) tips.push({ icon:'😷', text:'空气重度污染，尽量减少户外活动，外出必戴N95口罩', priority:5, type:'danger' });
  else if (aqi >= 150) tips.push({ icon:'😷', text:'空气中度污染，建议减少剧烈户外运动，佩戴口罩', priority:3, type:'warn' });

  // Cold snap
  if (appTemp <= -5) tips.push({ icon:'🥶', text:'极端低温，暴露皮肤有冻伤风险，尽量缩短户外时间', priority:4, type:'danger' });
  else if (appTemp <= 0 && wind >= 15) tips.push({ icon:'🥶', text:'风寒效应让体感更冷，注意手脚和耳朵的保暖', priority:3, type:'warn' });

  // Dry air
  if (hum <= 0.2 && temp >= 5) tips.push({ icon:'💧', text:'空气非常干燥（湿度' + Math.round(hum*100) + '%），多喝水，可以备个润唇膏', priority:1, type:'info' });

  // Good weather encouragement
  if (tips.length === 0) {
    const comfort = getComfortLevel(appTemp, hum, wind, rt.skycon);
    if (comfort.level === 'pleasant' || comfort.level === 'warm') {
      tips.push({ icon:'✨', text:'天气不错，适合出门走走！', priority:0, type:'good' });
    } else {
      tips.push({ icon:'👍', text:'没有特别需要注意的，正常出行就好', priority:0, type:'good' });
    }
  }

  // Sort by priority descending
  tips.sort((a, b) => b.priority - a.priority);

  card.style.display = 'block';
  list.innerHTML = tips.map(t =>
    `<div class="tip-item tip-${t.type}"><span class="tip-icon">${t.icon}</span><span class="tip-text">${t.text}</span></div>`
  ).join('');
}

function renderHourly(hr) {
  const wrap = document.getElementById('hourly');
  if (!hr || !hr.temperature) { wrap.innerHTML = ''; return; }
  const len = Math.min(hr.temperature.length, 24);
  let html = '';
  for (let i = 0; i < len; i++) {
    const t = hr.temperature[i], s = hr.skycon[i];
    const d = new Date(t.datetime), h = d.getHours();
    const precip = (hr.precipitation && hr.precipitation[i]) ? hr.precipitation[i].value : 0;
    const isP = (isRain(s.value) || isSnow(s.value)) && precip >= RAIN_THRESHOLD;
    const stab = getStability(t.datetime);
    let dot = '';
    if (stab.status) {
      const color = stab.status === 'green' ? 'var(--good)' : stab.status === 'yellow' ? 'var(--warn)' : 'var(--danger)';
      dot = `<div class="h-dot" style="background:${color}" title="基于${stab.count}次查询"></div>`;
    } else {
      dot = `<div class="h-dot" style="background:transparent"></div>`;
    }
    const precipLabel = precip >= RAIN_THRESHOLD ? `<div style="font-size:9px;color:var(--rain-light);margin-top:2px">${precip.toFixed(1)}mm</div>` : '';
    html += `<div class="hour-cell ${isP ? 'rain-cell' : ''}">
      <div class="h-lbl">${i === 0 ? '现在' : h + '时'}</div>
      <div class="h-ico">${emoji(s.value)}</div>
      <div class="h-t">${Math.round(t.value)}°</div>
      ${precipLabel}
      ${dot}
    </div>`;
  }
  wrap.innerHTML = html;
}

function renderDaily(daily) {
  const wrap = document.getElementById('daily');
  if (!daily || !daily.temperature) { wrap.innerHTML = ''; return; }
  const temps = daily.temperature;
  const allMin = Math.min(...temps.map(t => t.min));
  const allMax = Math.max(...temps.map(t => t.max));
  const range = allMax - allMin || 1;
  const days = ['周日', '周一', '周二', '周三', '周四', '周五', '周六'];
  let html = '';
  for (let i = 0; i < Math.min(5, temps.length); i++) {
    const t = temps[i], s = daily.skycon[i];
    const d = new Date(t.date);
    const today = new Date();
    today.setHours(0, 0, 0, 0);
    const diff = Math.round((d - today) / 86400000);
    const lbl = diff === 0 ? '今天' : diff === 1 ? '明天' : days[d.getDay()];
    const left = ((t.min - allMin) / range) * 100;
    const width = Math.max(8, ((t.max - t.min) / range) * 100);
    html += `<div class="daily-row">
      <div class="d-day">${lbl}</div>
      <div class="d-ico">${emoji(s.value)}</div>
      <div class="d-bar-wrap"><div class="d-bar" style="left:${left}%;width:${width}%"></div></div>
      <div class="d-t"><span class="lo">${Math.round(t.min)}°</span>${Math.round(t.max)}°</div>
    </div>`;
  }
  wrap.innerHTML = html;
}

function renderRefreshInfo() {
  const history = getHistory();
  document.getElementById('refreshInfo').innerHTML = `
    已缓存 ${history.length} 次查询历史 · 每 2 小时自动刷新 · 切回页面时自动检测<br>
    坐标已保存到本地，下次打开直接用缓存位置
  `;
}

// ===== INIT =====
window.addEventListener('load', () => {
  // Clean up old history with wrong threshold
  try { localStorage.removeItem('wx_history_v2'); } catch(e){}
  const saved = getCoord();
  if (saved) {
    setStatus('使用上次保存的位置...', '');
    fetchWeather(saved.lng, saved.lat);
  } else {
    setStatus('首次使用，请点击"一键定位"或手动选点', '');
  }
  // Periodic silent refresh while tab is open
  setInterval(silentRefresh, REFRESH_MS);
});

// Refresh on returning from background if stale
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible' && lastFetchTs > 0) {
    if (Date.now() - lastFetchTs > REFRESH_STALE_MIN * 60 * 1000) silentRefresh();
  }
});
</script>
