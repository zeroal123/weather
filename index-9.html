<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="带伞吗">
<meta name="theme-color" content="#0f172a">
<title>今天带伞吗？</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0f172a; --bg2: #1e293b; --bg3: #334155;
  --text: #e2e8f0; --dim: rgba(148,163,184,0.6); --accent: #38bdf8; --accent2: #818cf8;
  --card: rgba(30,41,59,0.85); --border: rgba(148,163,184,0.1);
  --rain: #3b82f6; --warn: #f59e0b; --danger: #ef4444; --good: #22c55e;
}
.t-rain { --bg:#0c1929; --bg2:#132744; --accent:#60a5fa; }
.t-clear { --bg:#fefce8; --bg2:#fef9c3; --bg3:#fef08a; --text:#1c1917; --dim:rgba(120,100,40,0.5); --accent:#f59e0b; --accent2:#ea580c; --card:rgba(254,249,195,0.9); --border:rgba(200,180,60,0.15); }

* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
body {
  font-family:'Noto Sans SC',-apple-system,sans-serif;
  background:var(--bg); color:var(--text);
  min-height:100vh; min-height:100dvh;
  padding:16px; padding-top:max(16px,env(safe-area-inset-top));
  padding-bottom:max(80px,env(safe-area-inset-bottom));
}
.container { max-width:480px; margin:0 auto; }

/* ===== HERO ===== */
.hero { text-align:center; padding:20px 0 12px; }
.hero-icon { font-size:56px; filter:drop-shadow(0 4px 24px rgba(56,189,248,0.3)); }
.hero h1 { font-size:20px; font-weight:700; margin:6px 0 2px; }
.hero .sub { font-size:12px; color:var(--dim); }

/* ===== ALERT BANNER ===== */
.alert-banner {
  background:linear-gradient(135deg,rgba(239,68,68,0.15),rgba(245,158,11,0.15));
  border:1px solid rgba(239,68,68,0.3); border-radius:12px;
  padding:10px 14px; margin-bottom:12px; display:none;
}
.alert-banner .alert-title { font-size:13px; font-weight:700; color:var(--danger); }
.alert-banner .alert-desc { font-size:11px; color:var(--text); margin-top:4px; line-height:1.5; }

/* ===== UMBRELLA VERDICT ===== */
.verdict {
  border-radius:16px; padding:16px 18px; margin-bottom:12px;
  text-align:center; font-weight:700; font-size:18px;
  border:1px solid var(--border);
}
.verdict.safe { background:linear-gradient(135deg,rgba(34,197,94,0.12),rgba(34,197,94,0.04)); color:var(--good); border-color:rgba(34,197,94,0.2); }
.verdict.rain { background:linear-gradient(135deg,rgba(59,130,246,0.15),rgba(59,130,246,0.05)); color:var(--rain); border-color:rgba(59,130,246,0.25); }
.verdict .verdict-sub { font-size:12px; font-weight:400; color:var(--dim); margin-top:4px; }

/* ===== CARDS ===== */
.card {
  background:var(--card); border:1px solid var(--border);
  border-radius:14px; padding:14px; margin-bottom:10px;
  backdrop-filter:blur(12px); -webkit-backdrop-filter:blur(12px);
}
.card-title { font-size:13px; font-weight:600; margin-bottom:10px; display:flex; align-items:center; gap:6px; }
.card-title span { opacity:0.7; }

/* ===== REALTIME ===== */
.rt-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
.rt-main { grid-column:1/3; display:flex; align-items:center; justify-content:center; gap:12px; padding:8px 0; }
.rt-temp { font-size:52px; font-weight:900; line-height:1; }
.rt-meta { font-size:13px; }
.rt-meta .skycon { font-weight:600; }
.rt-item { text-align:center; padding:8px 0; border-radius:10px; background:rgba(255,255,255,0.03); }
.rt-item .label { font-size:10px; color:var(--dim); }
.rt-item .val { font-size:15px; font-weight:700; margin-top:2px; }

/* ===== MINUTE RAIN ===== */
.rain-chart { position:relative; height:80px; display:flex; align-items:flex-end; gap:1px; margin-top:6px; }
.rain-bar { flex:1; min-width:0; border-radius:2px 2px 0 0; transition:height 0.3s; }
.rain-bar.light { background:var(--rain); opacity:0.5; }
.rain-bar.moderate { background:var(--warn); opacity:0.7; }
.rain-bar.heavy { background:var(--danger); opacity:0.85; }
.rain-bar.none { background:rgba(148,163,184,0.08); min-height:2px; }
.rain-labels { display:flex; justify-content:space-between; font-size:10px; color:var(--dim); margin-top:4px; }
.rain-legend { font-size:11px; color:var(--dim); margin-top:6px; text-align:center; }

/* ===== SUN & UV & AQI ROW ===== */
.info-row { display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px; margin-bottom:10px; }
.info-box {
  background:var(--card); border:1px solid var(--border);
  border-radius:14px; padding:12px 8px; text-align:center;
  backdrop-filter:blur(12px); -webkit-backdrop-filter:blur(12px);
}
.info-box .ib-icon { font-size:22px; }
.info-box .ib-label { font-size:10px; color:var(--dim); margin:4px 0 2px; }
.info-box .ib-val { font-size:14px; font-weight:700; }
.info-box .ib-desc { font-size:10px; color:var(--dim); margin-top:2px; }

/* ===== HOURLY ===== */
.hourly { display:flex; gap:4px; overflow-x:auto; -webkit-overflow-scrolling:touch; scrollbar-width:none; padding-bottom:2px; }
.hourly::-webkit-scrollbar { display:none; }
.h-item { flex:0 0 52px; text-align:center; padding:8px 4px; border-radius:10px; }
.h-item.is-rain { background:rgba(59,130,246,0.12); }
.h-item .h-time { font-size:10px; color:var(--dim); }
.h-item .h-icon { font-size:18px; margin:4px 0; }
.h-item .h-temp { font-size:12px; font-weight:700; }
.h-item .h-rain { font-size:9px; color:var(--rain); }

/* ===== DAILY ===== */
.daily-item {
  display:grid; grid-template-columns:60px 30px 1fr 48px;
  align-items:center; gap:6px; padding:10px 0;
  border-bottom:1px solid var(--border);
}
.daily-item:last-child { border-bottom:none; }
.d-day { font-size:13px; font-weight:500; }
.d-icon { font-size:20px; text-align:center; }
.d-bar-wrap { position:relative; height:6px; border-radius:3px; background:rgba(148,163,184,0.1); }
.d-bar { position:absolute; height:100%; border-radius:3px; background:linear-gradient(90deg,var(--accent),var(--accent2)); }
.d-temps { font-size:12px; font-weight:600; text-align:right; }
.d-temps .lo { color:var(--dim); font-weight:400; }

/* ===== MAP ===== */
.map-wrap { border-radius:14px; overflow:hidden; height:200px; margin-bottom:8px; border:1px solid var(--border); }
#amap { width:100%; height:100%; }
.map-tip { font-size:11px; color:var(--dim); text-align:center; margin-bottom:6px; }
.coord-row { display:flex; gap:6px; margin-bottom:10px; }
.coord-row input {
  flex:1; background:var(--bg2); border:1px solid var(--border);
  border-radius:10px; padding:10px 12px; color:var(--text); font-size:13px; outline:none;
}
.coord-row input:focus { border-color:var(--accent); }
.coord-row button, .btn-locate {
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  border:none; border-radius:10px; padding:10px 16px;
  color:#fff; font-size:13px; font-weight:600; cursor:pointer; white-space:nowrap;
}
.btn-locate { width:100%; margin-bottom:10px; padding:12px; font-size:14px; }

.status-msg { text-align:center; font-size:12px; color:var(--dim); margin:8px 0; }
.loading { text-align:center; padding:40px 0; color:var(--dim); }
.powered { text-align:center; font-size:10px; color:var(--dim); opacity:0.3; margin-top:16px; }

/* ===== CLOTHING ===== */
.cloth-box { text-align:center; padding:6px 0; }
.cloth-icon { font-size:28px; }
.cloth-text { font-size:14px; font-weight:600; margin-top:4px; }
.cloth-detail { font-size:11px; color:var(--dim); margin-top:2px; }

@keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
.fade { animation:fadeIn 0.4s ease both; }
</style>
</head>
<body>
<div class="container" id="app">

  <!-- Hero -->
  <div class="hero fade">
    <div class="hero-icon" id="heroIcon">🌤️</div>
    <h1 id="heroTitle">今天带伞吗？</h1>
    <div class="sub">精准定位 · 分钟级降雨 · 彩云天气</div>
  </div>

  <!-- Alert banner -->
  <div class="alert-banner" id="alertBanner">
    <div class="alert-title" id="alertTitle"></div>
    <div class="alert-desc" id="alertDesc"></div>
  </div>

  <!-- Locate button -->
  <button class="btn-locate" id="locBtn" onclick="tryAutoLocate()">📍 一键定位查天气</button>

  <!-- Map section (collapsed by default, expand on tap "手动选点") -->
  <div id="mapSection" style="display:none;">
    <div class="map-tip">👆 在地图上点击你的位置</div>
    <div class="map-wrap"><div id="amap"></div></div>
    <div class="coord-row">
      <input type="text" id="coordInput" placeholder="经度,纬度（如 104.07,30.67）">
      <button onclick="manualCoord()">查询</button>
    </div>
  </div>
  <div style="text-align:center;margin-bottom:10px;">
    <span id="toggleMap" onclick="toggleMap()" style="font-size:12px;color:var(--accent);cursor:pointer;">📌 手动选点 / 输入坐标</span>
  </div>

  <div class="status-msg" id="statusMsg"></div>

  <!-- Weather content (hidden until loaded) -->
  <div id="weatherContent" style="display:none;">

    <!-- Umbrella verdict -->
    <div class="verdict" id="verdict"></div>

    <!-- Minute-level rain chart -->
    <div class="card fade" id="minuteCard" style="display:none;">
      <div class="card-title">⏱️ <span>未来2小时逐分钟降雨</span></div>
      <div id="minuteDesc" style="font-size:12px;color:var(--dim);margin-bottom:6px;"></div>
      <div class="rain-chart" id="rainChart"></div>
      <div class="rain-labels"><span>现在</span><span>30分钟</span><span>60分钟</span><span>90分钟</span><span>120分钟</span></div>
      <div class="rain-legend" id="rainLegend"></div>
    </div>

    <!-- Realtime card -->
    <div class="card fade">
      <div class="card-title">🌡️ <span>实时天气</span></div>
      <div class="rt-grid" id="rtGrid"></div>
    </div>

    <!-- Sun / UV / AQI row -->
    <div class="info-row fade" id="infoRow"></div>

    <!-- Clothing -->
    <div class="card fade" id="clothCard">
      <div class="card-title">👔 <span>穿衣建议</span></div>
      <div class="cloth-box" id="clothBox"></div>
    </div>

    <!-- Hourly -->
    <div class="card fade">
      <div class="card-title">📊 <span>逐小时预报</span></div>
      <div class="hourly" id="hourlyWrap"></div>
    </div>

    <!-- Daily -->
    <div class="card fade">
      <div class="card-title">📅 <span>未来5天趋势</span></div>
      <div id="dailyWrap"></div>
    </div>

  </div>

  <div class="powered">定位：高德地图 · 天气：彩云天气</div>
</div>

<!-- Amap -->
<script>
window._AMapSecurityConfig = { securityJsCode:'dd51a7fa733ca2c539c401e047879f34' };
</script>
<script src="https://webapi.amap.com/maps?v=2.0&key=c62e981f36705c1ad2bcd25dca9b3641"></script>

<script>
const CAIYUN='DpS87YWOT1lMMBPB';
let map=null, marker=null, mapInited=false;

// ===== SKYCON MAPS =====
const EMOJI={CLEAR_DAY:'☀️',CLEAR_NIGHT:'🌙',PARTLY_CLOUDY_DAY:'⛅',PARTLY_CLOUDY_NIGHT:'☁️',CLOUDY:'☁️',LIGHT_HAZE:'🌫️',MODERATE_HAZE:'🌫️',HEAVY_HAZE:'🌫️',LIGHT_RAIN:'🌧️',MODERATE_RAIN:'🌧️',HEAVY_RAIN:'🌧️',STORM_RAIN:'⛈️',FOG:'🌫️',LIGHT_SNOW:'❄️',MODERATE_SNOW:'❄️',HEAVY_SNOW:'❄️',STORM_SNOW:'❄️',DUST:'🌪️',SAND:'🌪️',WIND:'💨'};
const CN={CLEAR_DAY:'晴',CLEAR_NIGHT:'晴',PARTLY_CLOUDY_DAY:'多云',PARTLY_CLOUDY_NIGHT:'多云',CLOUDY:'阴',LIGHT_HAZE:'轻度雾霾',MODERATE_HAZE:'中度雾霾',HEAVY_HAZE:'重度雾霾',LIGHT_RAIN:'小雨',MODERATE_RAIN:'中雨',HEAVY_RAIN:'大雨',STORM_RAIN:'暴雨',FOG:'雾',LIGHT_SNOW:'小雪',MODERATE_SNOW:'中雪',HEAVY_SNOW:'大雪',STORM_SNOW:'暴雪',DUST:'浮尘',SAND:'沙尘',WIND:'大风'};
const isRain=s=>s&&s.includes('RAIN');
const isSnow=s=>s&&s.includes('SNOW');
const getE=s=>EMOJI[s]||'🌤️';
const getC=s=>CN[s]||'未知';

// ===== THEME =====
function setTheme(skycon){
  document.body.classList.remove('t-rain','t-clear');
  if(isRain(skycon)||isSnow(skycon)) document.body.classList.add('t-rain');
  else if(skycon&&skycon.includes('CLEAR')) document.body.classList.add('t-clear');
}

// ===== MAP =====
function toggleMap(){
  const s=document.getElementById('mapSection');
  if(s.style.display==='none'){ s.style.display='block'; initMap(); }
  else s.style.display='none';
}
function initMap(){
  if(mapInited)return; mapInited=true;
  const saved=getSaved();
  const center=saved?[saved.lng,saved.lat]:[104.07,30.67];
  map=new AMap.Map('amap',{zoom:13,center,mapStyle:'amap://styles/dark'});
  if(saved){ marker=new AMap.Marker({position:center}); map.add(marker); }
  map.on('click',e=>{
    const lng=e.lnglat.getLng(), lat=e.lnglat.getLat();
    if(marker) map.remove(marker);
    marker=new AMap.Marker({position:[lng,lat]}); map.add(marker);
    document.getElementById('coordInput').value=lng.toFixed(4)+','+lat.toFixed(4);
    saveCoord(lng,lat); fetchWeather(lng,lat);
  });
}

function manualCoord(){
  const v=document.getElementById('coordInput').value.trim();
  const m=v.match(/([\d.]+)\s*[,，\s]\s*([\d.]+)/);
  if(!m){ showStatus('坐标格式不对，示例：104.07,30.67','err'); return; }
  const lng=parseFloat(m[1]), lat=parseFloat(m[2]);
  saveCoord(lng,lat); fetchWeather(lng,lat);
}

// ===== STORAGE =====
function saveCoord(lng,lat){ try{localStorage.setItem('wx_coord',JSON.stringify({lng,lat}))}catch(e){} }
function getSaved(){ try{return JSON.parse(localStorage.getItem('wx_coord'))}catch(e){return null} }

// ===== AUTO LOCATE =====
function tryAutoLocate(){
  showStatus('正在定位...','');
  document.getElementById('locBtn').disabled=true;
  // Try browser geolocation first
  if(navigator.geolocation){
    navigator.geolocation.getCurrentPosition(
      pos=>{
        const lng=pos.coords.longitude, lat=pos.coords.latitude;
        showStatus('GPS定位成功','ok');
        saveCoord(lng,lat); fetchWeather(lng,lat);
        document.getElementById('locBtn').disabled=false;
      },
      ()=>{ fallbackIP(); },
      {timeout:8000,enableHighAccuracy:true}
    );
  } else { fallbackIP(); }
}
function fallbackIP(){
  // Use saved coords if available
  const saved=getSaved();
  if(saved){
    showStatus('使用上次保存的位置','ok');
    fetchWeather(saved.lng,saved.lat);
    document.getElementById('locBtn').disabled=false;
    return;
  }
  // Amap IP locate
  AMap.plugin('AMap.CitySearch',()=>{
    new AMap.CitySearch().getLocalCity((status,result)=>{
      document.getElementById('locBtn').disabled=false;
      if(status==='complete'&&result.info==='OK'){
        const b=result.bounds;
        const lng=(b.northeast.lng+b.southwest.lng)/2;
        const lat=(b.northeast.lat+b.southwest.lat)/2;
        showStatus('IP粗定位：'+result.city+'（精度有限）','warn');
        saveCoord(lng,lat); fetchWeather(lng,lat);
      } else {
        showStatus('定位失败，请手动选点','err');
      }
    });
  });
}

function showStatus(msg,type){
  const el=document.getElementById('statusMsg');
  const colors={ok:'var(--good)',err:'var(--danger)',warn:'var(--warn)'};
  el.style.color=colors[type]||'var(--dim)';
  el.textContent=msg;
}

// ===== FETCH WEATHER (JSONP) =====
function fetchWeather(lng,lat){
  showStatus('获取天气数据...','');
  const url=`https://api.caiyunapp.com/v2.6/${CAIYUN}/${lng},${lat}/weather?alert=true&dailysteps=5&hourlysteps=24&minutely=true&unit=metric&callback=wxCallback`;
  // Remove old script
  const old=document.getElementById('wxScript'); if(old)old.remove();
  const s=document.createElement('script'); s.id='wxScript'; s.src=url;
  s.onerror=()=>showStatus('请求失败，请检查网络','err');
  document.head.appendChild(s);
}

// ===== CALLBACK =====
function wxCallback(data){
  if(!data||data.status!=='ok'||!data.result){
    showStatus('天气数据异常','err'); return;
  }
  showStatus('','');
  const r=data.result;
  renderAll(r);
}

// ===== RENDER =====
function renderAll(r){
  const rt=r.realtime, hr=r.hourly, daily=r.daily, minutely=r.minutely, alert=r.alert;
  const skycon=rt.skycon;

  setTheme(skycon);
  document.getElementById('heroIcon').textContent=getE(skycon);
  document.getElementById('heroTitle').textContent=getC(skycon)+' '+rt.temperature.toFixed(0)+'°C';

  // Alerts
  renderAlerts(alert);
  // Verdict
  renderVerdict(rt,minutely,hr);
  // Minute rain
  renderMinutely(minutely);
  // Realtime
  renderRealtime(rt);
  // Sun / UV / AQI
  renderInfoRow(rt,daily);
  // Clothing
  renderClothing(rt);
  // Hourly
  renderHourly(hr);
  // Daily
  renderDaily(daily);

  document.getElementById('weatherContent').style.display='block';
}

// ----- Alerts -----
function renderAlerts(alert){
  const el=document.getElementById('alertBanner');
  if(!alert||!alert.content||alert.content.length===0){ el.style.display='none'; return; }
  const a=alert.content[0];
  document.getElementById('alertTitle').textContent='⚠️ '+a.title;
  document.getElementById('alertDesc').textContent=a.description||'';
  el.style.display='block';
}

// ----- Verdict -----
function renderVerdict(rt,minutely,hr){
  const el=document.getElementById('verdict');
  const hasRainNow=isRain(rt.skycon)||isSnow(rt.skycon);
  // Check minutely
  let minuteRain=false, minuteDesc='';
  if(minutely&&minutely.precipitation_2h){
    const p=minutely.precipitation_2h;
    minuteRain=p.some(v=>v>0.03);
  }
  if(minutely&&minutely.description) minuteDesc=minutely.description;
  // Check hourly
  let hourRain=false, rainHours=[];
  if(hr&&hr.skycon){
    hr.skycon.forEach((s,i)=>{
      if(isRain(s.value)||isSnow(s.value)){ hourRain=true; rainHours.push(new Date(s.datetime).getHours()); }
    });
  }
  const willRain=hasRainNow||minuteRain||hourRain;
  if(willRain){
    el.className='verdict rain';
    el.innerHTML='🌂 带伞！'+(minuteDesc?'<div class="verdict-sub">'+minuteDesc+'</div>':'');
  } else {
    el.className='verdict safe';
    el.innerHTML='😎 不用带伞<div class="verdict-sub">今天降雨概率很低，放心出门</div>';
  }
}

// ----- Minutely rain chart -----
function renderMinutely(m){
  const card=document.getElementById('minuteCard');
  if(!m||!m.precipitation_2h||m.precipitation_2h.length===0){ card.style.display='none'; return; }
  const p=m.precipitation_2h;
  const hasAny=p.some(v=>v>0.03);
  // Always show the card but with appropriate messaging
  card.style.display='block';
  document.getElementById('minuteDesc').textContent=m.description||'';

  const chart=document.getElementById('rainChart');
  const maxP=Math.max(...p,0.5);
  let html='';
  for(let i=0;i<p.length;i++){
    const v=p[i];
    let cls='none', h=2;
    if(v>0.03){
      h=Math.max(6,(v/maxP)*70);
      cls=v>0.25?'heavy':v>0.1?'moderate':'light';
    }
    html+=`<div class="rain-bar ${cls}" style="height:${h}px" title="${v.toFixed(2)}mm/h"></div>`;
  }
  chart.innerHTML=html;

  const legend=document.getElementById('rainLegend');
  if(hasAny) legend.innerHTML='<span style="color:var(--rain)">■</span>小雨 <span style="color:var(--warn)">■</span>中雨 <span style="color:var(--danger)">■</span>大雨';
  else legend.textContent='🟢 未来2小时无降雨';
}

// ----- Realtime -----
function renderRealtime(rt){
  const feel=rt.apparent_temperature.toFixed(0);
  const hum=(rt.humidity*100).toFixed(0);
  const wind=rt.wind.speed.toFixed(1);
  const vis=(rt.visibility||0).toFixed(1);
  const pres=(rt.pressure/100).toFixed(0);
  document.getElementById('rtGrid').innerHTML=`
    <div class="rt-main">
      <div class="rt-temp">${rt.temperature.toFixed(0)}°</div>
      <div class="rt-meta">
        <div class="skycon">${getC(rt.skycon)}</div>
        <div style="color:var(--dim);font-size:12px">体感 ${feel}°</div>
      </div>
    </div>
    <div class="rt-item"><div class="label">湿度</div><div class="val">${hum}%</div></div>
    <div class="rt-item"><div class="label">风速</div><div class="val">${wind}m/s</div></div>
    <div class="rt-item"><div class="label">能见度</div><div class="val">${vis}km</div></div>
    <div class="rt-item"><div class="label">气压</div><div class="val">${pres}hPa</div></div>`;
}

// ----- Info row: Sunrise, UV, AQI -----
function renderInfoRow(rt,daily){
  // Sunrise/Sunset
  let sunrise='--', sunset='--';
  if(daily&&daily.astro&&daily.astro[0]){
    sunrise=daily.astro[0].sunrise.time;
    sunset=daily.astro[0].sunset.time;
  }
  // UV
  const uv=rt.life_index&&rt.life_index.ultraviolet?rt.life_index.ultraviolet.index:0;
  const uvDesc=rt.life_index&&rt.life_index.ultraviolet?rt.life_index.ultraviolet.desc:'--';
  // AQI
  const aqi=rt.air_quality&&rt.air_quality.aqi?rt.air_quality.aqi.chn:0;
  const pm25=rt.air_quality?rt.air_quality.pm25:0;
  const aqiInfo=getAQIInfo(aqi);

  document.getElementById('infoRow').innerHTML=`
    <div class="info-box">
      <div class="ib-icon">🌅</div>
      <div class="ib-label">日出/日落</div>
      <div class="ib-val" style="font-size:12px">${sunrise}</div>
      <div class="ib-desc">${sunset}</div>
    </div>
    <div class="info-box">
      <div class="ib-icon">☀️</div>
      <div class="ib-label">紫外线</div>
      <div class="ib-val">${uv}</div>
      <div class="ib-desc">${uvDesc}</div>
    </div>
    <div class="info-box">
      <div class="ib-icon" style="color:${aqiInfo.color}">●</div>
      <div class="ib-label">空气质量</div>
      <div class="ib-val" style="color:${aqiInfo.color}">${aqi}</div>
      <div class="ib-desc">${aqiInfo.level} PM2.5:${pm25}</div>
    </div>`;
}

function getAQIInfo(aqi){
  if(aqi<=50) return {level:'优',color:'var(--good)'};
  if(aqi<=100) return {level:'良',color:'var(--warn)'};
  if(aqi<=150) return {level:'轻度污染',color:'#f97316'};
  if(aqi<=200) return {level:'中度污染',color:'var(--danger)'};
  if(aqi<=300) return {level:'重度污染',color:'#7c2d12'};
  return {level:'严重污染',color:'#581c87'};
}

// ----- Clothing -----
function renderClothing(rt){
  const t=rt.apparent_temperature;
  let icon,text,detail;
  if(t>=30){ icon='🩳'; text='短袖短裤'; detail='天气炎热，注意防暑'; }
  else if(t>=25){ icon='👕'; text='短袖'; detail='舒适偏热，轻薄即可'; }
  else if(t>=20){ icon='👔'; text='薄长袖/衬衫'; detail='温度适中，舒适'; }
  else if(t>=15){ icon='🧥'; text='薄外套'; detail='早晚偏凉，带件外套'; }
  else if(t>=10){ icon='🧥'; text='外套+长裤'; detail='有点凉，注意保暖'; }
  else if(t>=5){ icon='🧣'; text='厚外套/风衣'; detail='偏冷，需要保暖'; }
  else if(t>=0){ icon='🧤'; text='棉衣/羽绒服'; detail='寒冷，注意防寒'; }
  else { icon='🥶'; text='重装保暖'; detail='极寒，全副武装出门'; }
  document.getElementById('clothBox').innerHTML=`
    <div class="cloth-icon">${icon}</div>
    <div class="cloth-text">${text}</div>
    <div class="cloth-detail">${detail}（体感${t.toFixed(0)}°）</div>`;
}

// ----- Hourly -----
function renderHourly(hr){
  const wrap=document.getElementById('hourlyWrap');
  if(!hr||!hr.temperature){ wrap.innerHTML='暂无数据'; return; }
  const len=Math.min(hr.temperature.length,24);
  let html='';
  for(let i=0;i<len;i++){
    const t=hr.temperature[i], s=hr.skycon[i], p=hr.precipitation[i];
    const h=new Date(t.datetime).getHours();
    const rain=isRain(s.value)||isSnow(s.value);
    const rainPct=p?p.probability||0:0;
    html+=`<div class="h-item ${rain?'is-rain':''}">
      <div class="h-time">${h}时</div>
      <div class="h-icon">${getE(s.value)}</div>
      <div class="h-temp">${t.value.toFixed(0)}°</div>
      ${rain?'<div class="h-rain">'+rainPct+'%</div>':''}
    </div>`;
  }
  wrap.innerHTML=html;
}

// ----- Daily -----
function renderDaily(daily){
  const wrap=document.getElementById('dailyWrap');
  if(!daily||!daily.temperature){ wrap.innerHTML='暂无数据'; return; }
  const days=['周日','周一','周二','周三','周四','周五','周六'];
  const allMin=Math.min(...daily.temperature.map(d=>d.min));
  const allMax=Math.max(...daily.temperature.map(d=>d.max));
  const range=allMax-allMin||1;
  let html='';
  for(let i=0;i<daily.temperature.length;i++){
    const t=daily.temperature[i], s=daily.skycon[i];
    const d=new Date(t.date);
    const dayLabel=i===0?'今天':i===1?'明天':days[d.getDay()];
    const lo=t.min.toFixed(0), hi=t.max.toFixed(0);
    const left=((t.min-allMin)/range)*100;
    const width=Math.max(8,((t.max-t.min)/range)*100);
    html+=`<div class="daily-item">
      <div class="d-day">${dayLabel}</div>
      <div class="d-icon">${getE(s.value)}</div>
      <div class="d-bar-wrap"><div class="d-bar" style="left:${left}%;width:${width}%"></div></div>
      <div class="d-temps"><span class="lo">${lo}°</span> ${hi}°</div>
    </div>`;
  }
  wrap.innerHTML=html;
}

  const saved=getSaved();
  if(saved){
    showStatus('加载上次位置...','');
    fetchWeather(saved.lng,saved.lat);
  }
});
